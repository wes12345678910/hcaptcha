<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free hCaptcha Test</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .form-group { margin-bottom: 15px; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        #result { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>

<div class="container">
    <h2>Hobby Host hCaptcha Test</h2>
    <form id="testForm">
        <div class="form-group">
            <input type="text" id="name" placeholder="Your Name" required style="width:100%; padding:8px; box-sizing:border-box;">
        </div>
        <div class="h-captcha" data-sitekey="ca6a8d00-788c-4efa-a23a-296683e2dbae"></div>
        <button type="submit">Submit Form</button>
    </form>
    <div id="result"></div>
</div>

<script>
    document.getElementById('testForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const resultDiv = document.getElementById('result');
        const hcaptchaVal = document.querySelector('[name=h-captcha-response]').value;

        if (hcaptchaVal === "") {
            resultDiv.className = 'error';
            resultDiv.innerHTML = "Please complete the CAPTCHA.";
            resultDiv.style.display = 'block';
            return;
        }

        // Send the token to your free backend .js file
        fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: hcaptchaVal })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                resultDiv.className = 'success';
                resultDiv.innerHTML = "<strong>Success!</strong> Server verified the secret key.";
            } else {
                resultDiv.className = 'error';
                resultDiv.innerHTML = "<strong>Failed:</strong> " + data.message;
            }
            resultDiv.style.display = 'block';
        })
        .catch(err => {
            resultDiv.className = 'error';
            resultDiv.innerHTML = "Error connecting to server.";
            resultDiv.style.display = 'block';
        });
    });
</script>
</body>
</html>
